<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生图工作台 · 方案1 Studio 分栏</title>
<style>
  :root{
    --bg:#0e0e16; --panel:#171722; --panel2:#1f1f2e; --line:#2a2a3a;
    --txt:#ECECF3; --mut:#9a9ab0; --acc1:#a855f7; --acc2:#ec4899;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;overflow:hidden}
  .side{width:400px;flex:none;background:var(--panel);border-right:1px solid var(--line);padding:22px;display:flex;flex-direction:column;gap:18px;overflow:auto}
  .brand{display:flex;align-items:center;justify-content:space-between}
  .brand h1{font-size:18px;font-weight:700;background:linear-gradient(90deg,var(--acc1),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .pts{font-size:13px;color:var(--mut);background:var(--panel2);padding:6px 12px;border-radius:20px}
  .pts b{color:var(--txt)}
  label{font-size:13px;color:var(--mut);display:block;margin-bottom:7px}
  textarea{width:100%;min-height:130px;resize:vertical;background:var(--panel2);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:12px;font-size:14px;font-family:inherit}
  textarea:focus,select:focus{outline:none;border-color:var(--acc1)}
  select{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:11px;font-size:14px}
  .drop{border:1.5px dashed var(--line);border-radius:12px;padding:16px;text-align:center;color:var(--mut);font-size:13px;cursor:pointer;transition:.2s}
  .drop:hover{border-color:var(--acc1);color:var(--txt)}
  .row{display:flex;gap:10px}
  .row>div{flex:1}
  .gen{margin-top:auto;background:linear-gradient(90deg,var(--acc1),var(--acc2));border:none;color:#fff;font-size:15px;font-weight:600;padding:14px;border-radius:12px;cursor:pointer}
  .gen:hover{filter:brightness(1.08)}
  .main{flex:1;padding:26px;overflow:auto}
  .bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-size:12px;color:var(--mut);background:var(--panel);border:1px solid var(--line);padding:7px 13px;border-radius:20px}
  .chip.on{color:#fff;border-color:transparent;background:linear-gradient(90deg,var(--acc1),var(--acc2))}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
  .card{aspect-ratio:1;border-radius:14px;overflow:hidden;position:relative;background:linear-gradient(135deg,#26263a,#3a2740)}
  .card .tag{position:absolute;left:8px;bottom:8px;font-size:11px;background:rgba(0,0,0,.45);padding:3px 8px;border-radius:8px;color:#fff}
  .card .dl{position:absolute;right:8px;top:8px;background:rgba(0,0,0,.45);width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:13px}
</style>
</head>
<body>
  <aside class="side">
    <div class="brand"><h1>◆ 生图工作台</h1><span class="pts">点数 <b>320</b></span></div>
    <div>
      <label>提示词</label>
      <textarea placeholder="描述你想生成的画面…使用参考图时可用「图片1」指代"></textarea>
    </div>
    <div class="row">
      <div>
        <label>模型</label>
        <select><option>GPT 生图（10 点/张）</option><option>SDXL（5 点/张）</option></select>
      </div>
      <div>
        <label>张数</label>
        <select><option>1 张</option><option>2 张</option></select>
      </div>
    </div>
    <div>
      <label>参考图（最多 5 张）</label>
      <div class="drop">＋ 点击或拖拽上传图片</div>
    </div>
    <button class="gen">✦ 生成</button>
  </aside>

  <main class="main">
    <div class="bar">
      <div class="chips">
        <span class="chip on">1:1</span><span class="chip">3:2</span><span class="chip">2:3</span>
        <span class="chip">4:3</span><span class="chip">3:4</span><span class="chip">16:9</span>
        <span class="chip">9:16</span><span class="chip">auto</span>
      </div>
      <span class="chip">最近 12 条</span>
    </div>
    <div class="grid">
      <div class="card"><span class="tag">1:1 · GPT 生图</span><span class="dl">↓</span></div>
      <div class="card"><span class="tag">1:1 · GPT 生图</span><span class="dl">↓</span></div>
      <div class="card"><span class="tag">16:9 · SDXL</span><span class="dl">↓</span></div>
      <div class="card"><span class="tag">2:3 · GPT 生图</span><span class="dl">↓</span></div>
      <div class="card"><span class="tag">1:1 · GPT 生图</span><span class="dl">↓</span></div>
      <div class="card"><span class="tag">3:4 · SDXL</span><span class="dl">↓</span></div>
    </div>
  </main>
</body>
</html>
