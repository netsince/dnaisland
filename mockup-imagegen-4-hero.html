<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生图工作台 · 方案4 极简 Hero</title>
<style>
  :root{
    --bg:#0e0e16; --panel:#171722; --panel2:#1f1f2e; --line:#2a2a3a;
    --txt:#ECECF3; --mut:#9a9ab0; --acc1:#a855f7; --acc2:#ec4899;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:
    radial-gradient(1200px 600px at 50% -10%,rgba(168,85,247,.18),transparent),var(--bg);
    color:var(--txt);min-height:100vh}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:20px 32px}
  .nav h1{font-size:18px;font-weight:700;background:linear-gradient(90deg,var(--acc1),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .nav .pts{font-size:13px;color:var(--mut);background:var(--panel2);padding:7px 14px;border-radius:20px}
  .hero{max-width:760px;margin:6vh auto 0;padding:0 20px;text-align:center}
  .hero h2{font-size:30px;font-weight:700;margin-bottom:8px}
  .hero p{color:var(--mut);margin-bottom:30px;font-size:15px}
  .prompt{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:10px 12px;box-shadow:0 12px 40px rgba(0,0,0,.4)}
  .prompt input{flex:1;background:transparent;border:none;color:var(--txt);font-size:15px;padding:10px;font-family:inherit}
  .prompt input:focus{outline:none}
  .prompt button{background:linear-gradient(90deg,var(--acc1),var(--acc2));border:none;color:#fff;font-weight:600;padding:12px 24px;border-radius:13px;cursor:pointer}
  .pillrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:26px 0 8px}
  .pill{font-size:13px;color:var(--mut);background:var(--panel);border:1px solid var(--line);padding:8px 15px;border-radius:22px;cursor:pointer}
  .pill.on{color:#fff;border-color:transparent;background:linear-gradient(90deg,var(--acc1),var(--acc2))}
  .gallery{max-width:1100px;margin:40px auto;padding:0 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
  .gallery .ph{aspect-ratio:1;border-radius:16px;background:linear-gradient(135deg,#26263a,#3a2740);position:relative;overflow:hidden}
  .gallery .ph:hover{transform:scale(1.02);transition:.2s}
</style>
</head>
<body>
  <div class="nav"><h1>◆ DNAISLAND 生图</h1><span class="pts">点数 <b style="color:var(--txt)">320</b></span></div>

  <div class="hero">
    <h2>描述你想画的世界</h2>
    <p>一句话，让 AI 为你绘出角色、场景与想象</p>
    <div class="prompt">
      <input placeholder="例如：樱花树下的剑客，水墨风格">
      <button>生成 ✦</button>
    </div>
    <div class="pillrow">
      <span class="pill on">1:1</span><span class="pill">3:2</span><span class="pill">16:9</span>
      <span class="pill">9:16</span><span class="pill">auto</span>
      <span class="pill">GPT 生图</span><span class="pill">SDXL</span>
      <span class="pill">1 张</span><span class="pill">2 张</span>
      <span class="pill">＋ 参考图</span>
    </div>
  </div>

  <div class="gallery">
    <div class="ph"></div><div class="ph"></div><div class="ph"></div><div class="ph"></div>
    <div class="ph"></div><div class="ph"></div><div class="ph"></div><div class="ph"></div>
  </div>
</body>
</html>
