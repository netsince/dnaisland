{% extends "base.html" %}

{% block title %}首页 · DNAISLAND{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6 text-center">
    <h1 class="display-5 fw-bold mb-3">欢迎来到 DNAISLAND</h1>
    <p class="lead text-secondary">
      与汝共奏（DNA）的角色卡分享社区。在这里发现、收藏并分享你的 TA。
    </p>
    {% if not current_user.is_authenticated %}
      <div class="d-flex gap-2 justify-content-center mt-4">
        <a class="btn btn-primary" href="{{ url_for('auth.register') }}">立即注册</a>
        <a class="btn btn-outline-secondary" href="{{ url_for('auth.login') }}">去登录</a>
      </div>
    {% else %}
      <p class="mt-4">
        你好，<strong>{{ current_user.nickname }}</strong>。角色卡功能即将上线。
      </p>
    {% endif %}
  </div>
</div>
{% endblock %}
