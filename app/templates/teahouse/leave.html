{% extends "base.html" %}

{% block title %}即将离开 DNAISLAND{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-6">
    <div class="card my-5">
      <div class="card-body text-center">
        <h3 class="h5">您将要离开本网站</h3>
        <p class="text-muted">你正在前往以下外部网站：</p>
        <p class="text-break"><code>{{ url }}</code></p>
        <p class="small text-muted">
          DNAISLAND 无法保证外部网站的安全性或内容真实性，请自行判断并保护好个人信息。
        </p>
        <div class="d-flex justify-content-center gap-2 mt-3">
          <a class="btn btn-outline-secondary" href="{{ url_for('teahouse.index') }}">取消，留在站内</a>
          <a class="btn btn-primary" href="{{ url }}" target="_blank" rel="noopener noreferrer">继续访问（自行承担风险）</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
