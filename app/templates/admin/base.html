{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar py-3" style="min-height: calc(100vh - 56px);">
      <div class="position-sticky">
        <div class="px-3 mb-3 text-muted small text-uppercase">管理后台</div>
        <ul class="nav flex-column nav-pills">
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint.startswith('admin.users') %}active{% endif %}"
               href="{{ url_for('admin.users') }}">用户管理</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint.startswith('admin.cards') %}active{% endif %}"
               href="{{ url_for('admin.cards') }}">角色卡管理</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint.startswith('admin.review') %}active{% endif %}"
               href="{{ url_for('admin.review') }}">审核</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint.startswith('admin.reports') %}active{% endif %}"
               href="{{ url_for('admin.reports') }}">举报管理</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint.startswith('admin.comment_moderation') %}active{% endif %}"
               href="{{ url_for('admin.comment_moderation') }}">评论审核</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint.startswith('admin.comments') %}active{% endif %}"
               href="{{ url_for('admin.comments') }}">评论管理</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint.startswith('admin.tea_moderation') %}active{% endif %}"
               href="{{ url_for('admin.tea_moderation') }}">茶馆审核</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint.startswith('admin.tea_posts') %}active{% endif %}"
               href="{{ url_for('admin.tea_posts') }}">茶馆管理</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint.startswith('admin.notify_send') %}active{% endif %}"
               href="{{ url_for('admin.notify_send') }}">发送通知</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint.startswith('admin.punish_appeals') %}active{% endif %}"
               href="{{ url_for('admin.punish_appeals') }}">处罚申诉</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint.startswith('admin.articles') %}active{% endif %}"
               href="{{ url_for('admin.articles') }}">文章管理</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'admin.system_config' %}active{% endif %}"
               href="{{ url_for('admin.system_config') }}">系统配置</a>
          </li>
        </ul>
      </div>
    </nav>
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-3">
      {% block admin_content %}{% endblock %}
    </main>
  </div>
</div>
{% endblock %}
