{% extends "admin/base.html" %}

{% block title %}编辑用户 · DNAISLAND{% endblock %}

{% block admin_content %}
<h2 class="h4 mb-3">{{ '新建用户' if not user else '编辑用户 #' ~ user.id }}</h2>
<form method="post" class="col-12 col-md-8">
  <div class="mb-3">
    <label class="form-label">用户名</label>
    <input type="text" class="form-control" name="username"
           value="{{ user.username if user else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">昵称</label>
    <input type="text" class="form-control" name="nickname"
           value="{{ user.nickname if user else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">邮箱</label>
    <input type="email" class="form-control" name="email"
           value="{{ user.email if user else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">角色</label>
    <select class="form-select" name="role">
      <option value="user" {% if user and user.role == 'user' %}selected{% endif %}>user</option>
      <option value="super_admin" {% if user and user.role == 'super_admin' %}selected{% endif %}>super_admin</option>
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">状态</label>
    <select class="form-select" name="status">
      <option value="active" {% if user and user.status == 'active' %}selected{% endif %}>正常 (active)</option>
      <option value="admin_del" {% if user and user.status == 'admin_del' %}selected{% endif %}>已删除 (admin_del)</option>
      <option value="user_del" {% if user and user.status == 'user_del' %}selected{% endif %}>已注销 (user_del)</option>
      <option value="mourning" {% if user and user.status == 'mourning' %}selected{% endif %}>纪念 (mourning)</option>
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">点数</label>
    <input type="number" class="form-control" name="points"
           value="{{ user.points if user and user.points is not none else 0 }}">
    <div class="form-text">留空则不修改。修改将记入积分明细。</div>
  </div>
  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" name="verified" id="verified"
           value="1" {% if user and user.verified %}checked{% endif %}>
    <label class="form-check-label" for="verified">平台认证（在昵称旁显示认证徽章）</label>
  </div>
  <div class="mb-3">
    <label class="form-label">认证说明（可选）</label>
    <input type="text" class="form-control" name="verified_label" maxlength="50"
           value="{{ user.verified_label if user and user.verified_label else '' }}"
           placeholder="如：官方 / 知名创作者">
  </div>
  <div class="mb-3">
    <label class="form-label">密码{% if user %}（留空则不修改）{% endif %}</label>
    <input type="password" class="form-control" name="password" {% if not user %}required{% endif %}>
  </div>
  <button class="btn btn-primary" type="submit">保存</button>
  <a class="btn btn-link" href="{{ url_for('admin.users') }}">返回</a>
</form>
{% endblock %}
