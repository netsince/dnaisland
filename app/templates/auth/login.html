{% extends "base.html" %}

{% block title %}登录 · DNAISLAND{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-7 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="h4 mb-4 text-center">登录</h2>
        <form method="post" novalidate>
          <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
          <div class="mb-3">
            <label for="identifier" class="form-label">用户名或邮箱</label>
            <input type="text" class="form-control" id="identifier" name="identifier"
                   value="{{ request.form.identifier or '' }}" required autofocus>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">密码</label>
            <input type="password" class="form-control" id="password" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">登录</button>
        </form>
        <p class="text-center mt-3 mb-0">
          还没有账号？<a href="{{ url_for('auth.register') }}">去注册</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
